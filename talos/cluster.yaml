---
# yaml-language-server: $schema=https://docs.siderolabs.com/talos/v1.13/schemas/config.schema.json
cluster:
  allowSchedulingOnControlPlanes: true
  etcd:
    advertisedSubnets:
      - ${IPV6_BASE}::/48
  network:
    cni:
      name: none
    podSubnets:
      - ${IPV6_BASE}:6900::/56
    serviceSubnets:
      - fd00:10:96::/112
  proxy:
    disabled: true
machine:
  files:
    - op: create
      path: /etc/cri/conf.d/20-customization.part
      content: |
        [plugins."io.containerd.cri.v1.images"]
          discard_unpacked_layers = false
  kubelet:
    nodeIP:
      validSubnets:
        - ${IPV6_BASE}::/48
  sysctls:
    net.ipv6.conf.onboard/60.accept_ra: "0"
    net.ipv6.conf.onboard/70.accept_ra: "0"
    net.ipv6.conf.onboard/60.autoconf: "0"
    net.ipv6.conf.onboard/70.autoconf: "0"
---
# yaml-language-server: $schema=https://docs.siderolabs.com/talos/v1.13/schemas/config.schema.json
apiVersion: v1alpha1
kind: ResolverConfig
nameservers:
  - address: ${IPV6_BASE}:1020::1
---
# yaml-language-server: $schema=https://docs.siderolabs.com/talos/v1.13/schemas/config.schema.json
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  maxSize: 100GiB
---
# yaml-language-server: $schema=https://docs.siderolabs.com/talos/v1.13/schemas/config.schema.json
apiVersion: v1alpha1
kind: UserVolumeConfig
name: local-hostpath
provisioning:
  diskSelector:
    match: system_disk
  minSize: 250GB
  grow: true
