---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mc-duckcraft
  namespace: minecraft
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: itzg-minecraft
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # https://github.com/itzg/minecraft-server-charts/blob/master/charts/minecraft/values.yaml

    image:
      repository: itzg/minecraft-server
      tag: java21-graalvm@sha256:a571c6972b0a622b882210e6a848f7cdc300ba47f18942bd80e6a64a03e6167f

    resources:
      requests:
        cpu: 2000m
        memory: 8Gi

    # StatefulSet to allow server to be stopped
    workloadAsStatefulSet: true
    strategyType: OnDelete

    podLabels:
      containertype: minecraft-server

    extraEnv:
      PAPER_BUILD: 194
      TZ: Australia/Perth

    minecraftServer:
      eula: true
      version: 1.21.4
      type: PAPER

      difficulty: hard
      whitelist: duckworld
      ops: duckworld
      maxPlayers: 20
      gameMode: survival
      motd: DuckCraft

      memory: 8192M

      modrinth:
        projects:
          - luckperms:v5.4.145-bukkit
          - tab-was-taken:5.0.7

    serviceAnnotations:
      mc-router.itzg.me/externalServerName: mc.home.ducknet.fun

    persistence:
      dataDir:
        enabled: true
        existingClaim: *app
