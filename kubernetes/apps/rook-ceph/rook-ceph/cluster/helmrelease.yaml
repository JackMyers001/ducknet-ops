---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  interval: 1h
  values:
    cephClusterSpec:
      csi:
        readAffinity:
          enabled: true
          crushLocationLabels:
            - kubernetes.io/hostname

      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
        prometheusEndpoint: http://prometheus-operated.observability.svc.cluster.local:9090

      mgr:
        modules:
          - name: pg_autoscaler
            enabled: true

      network:
        dualStack: false
        ipFamily: IPv6
        provider: host

        addressRanges:
          public: &network [fd5a:5b4f:9241::/64]
          cluster: *network

        connections:
          requireMsgr2: true

      storage:
        devicePathFilter: /dev/disk/by-id/nvme-SAMSUNG_MZQL23T8HCLS*
        useAllDevices: true
        useAllNodes: true

    monitoring:
      enabled: true
      createPrometheusRules: true

    toolbox:
      enabled: true

    route:
      dashboard:
        host:
          name: rook.${DOMAIN_DN}
          path: /
          pathType: PathPrefix
        parentRefs:
          - name: envoy-internal
            namespace: envoy-gateway-system

    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3

        storageClass:
          enabled: true
          name: ceph-block

          allowVolumeExpansion: true
          isDefault: true
          reclaimPolicy: Delete
          volumeBindingMode: Immediate

          mountOptions:
            - discard

          parameters:
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            imageFeatures: deep-flatten,exclusive-lock,fast-diff,layering,object-map
            imageFormat: "2"

    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool

      deletionPolicy: Delete
      isDefault: true

    cephFileSystems: []
    cephObjectStores: []
