---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  values:
    controllers:
      home-assistant:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.7.2@sha256:547d0fcb67ceb2c2d3adf22db37c7ea79d9ff9e91f3e3c536c6aebd998083f0f

            env:
              HASS_HTTP_TRUSTED_PROXY_1: ${IPV6_BASE}:6900::/56
              TZ: Australia/Perth

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi

    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "iot-wan",
              "namespace": "kube-system",
              "ips": ["10.4.60.20/24"],
              "mac": "e6:42:10:16:2f:d4"
            },
            {
              "name": "iot-nowan",
              "namespace": "kube-system",
              "ips": ["10.4.70.20/24"],
              "mac": "e6:42:10:16:2f:d5"
            }
          ]
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123

    route:
      app:
        hostnames:
          - hass.${DOMAIN_DN}
        parentRefs:
          - name: envoy-external
            namespace: envoy-gateway-system
          - name: envoy-internal
            namespace: envoy-gateway-system

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"

      config-cache:
        existingClaim: "{{ .Release.Name }}-cache"
        globalMounts:
          - path: /config/.venv

      tmp:
        type: emptyDir
