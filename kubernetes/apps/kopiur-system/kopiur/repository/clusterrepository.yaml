---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: nas
spec:
  allowedNamespaces:
    all: true

  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: coeus.storage.internal
          path: /mnt/coeus-pool/k8s/kopiur

  credentialProjection:
    allowed: true

  encryption:
    passwordSecretRef:
      name: kopiur-nas-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD

  identityDefaults:
    hostnameExpr: namespace
    usernameExpr: namespace + '-' + policyName

  moverDefaults:
    cache:
      capacity: 1Mi # Ignored
      mode: Ephemeral
      storageClassName: openebs-hostpath

    podSecurityContext:
      fsGroup: 65534
      fsGroupChangePolicy: OnRootMismatch

    scratch:
      capacity: 1Mi # Ignored
      storageClassName: openebs-hostpath

    securityContext:
      runAsUser: 65534
      runAsGroup: 65534

    ttlSecondsAfterFinished: 300

  scheduleDefaults:
    timezone: Australia/Perth
