---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  chartRef:
    kind: OCIRepository
    name: cilium
  interval: 1h
  values:
    autoDirectNodeRoutes: true

    bgpControlPlane:
      enabled: true

    bpf:
      datapathMode: netkit

    bpfClockProbe: true

    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup

    cni:
      exclusive: false

    devices: enp1s0f+

    enableIPv6BIGTCP: true
    enableIPv6Masquerade: false

    ipam:
      mode: kubernetes

    ipv4:
      enabled: false

    ipv6:
      enabled: true

    ipv6NativeRoutingCIDR: ${IPV6_BASE}::/48

    k8sServiceHost: localhost
    k8sServicePort: 7445
    kubeProxyReplacement: true

    loadBalancer:
      acceleration: native
      mode: hybrid

    operator:
      dashboards:
        enabled: true

      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true

      replicas: 2
      rollOutPods: true

    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true

    routingMode: native

    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
